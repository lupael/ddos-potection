---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ddos-app-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: ddos-app-secret
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: secret/ddos/app
        property: SECRET_KEY
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/ddos/app
        property: JWT_SECRET
