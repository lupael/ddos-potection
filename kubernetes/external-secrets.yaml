apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ddos-db-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: ddos-db-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: secret/ddos/database
        property: DB_URL
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/ddos/database
        property: DB_PASSWORD
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ddos-redis-secret
  namespace: default
spec:
